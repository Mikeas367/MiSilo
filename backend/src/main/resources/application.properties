spring.application.name=MiSilo
# ${VARIABLE_ENTORNO:DEFAULT}

# ----> Base de datos
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:mi_silo_db}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----> JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ----> app
app.cors.allowed-origins=${FRONT_URL:http://localhost:5173}